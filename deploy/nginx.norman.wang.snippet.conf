# 与 norman-wang 仓库 deploy/nginx/16.2/norman.wang/photo-layout.conf 保持一致
# 16.2 已 include: conf.d/norman.wang/photo-layout.conf
# 反代到 145 上的 PhotoLayout 服务（默认 :5088）

location /tools/photo-layout/api/ {
    proxy_pass http://10.10.10.100:5088/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 32m;
}

location /tools/photo-layout/ {
    proxy_pass http://10.10.10.100:5088/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 32m;
}
